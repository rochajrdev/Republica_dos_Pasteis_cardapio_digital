services:
  db:
    image: postgres:15
    container_name: republica_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: republica123
      POSTGRES_DB: republica_pasteis
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - republica-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: republica_backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:republica123@db:5432/republica_pasteis?schema=public"
      PORT: 3001
      JWT_SECRET: "republica-secret-key-2026"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - republica-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: republica_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - republica-network

networks:
  republica-network:
    driver: bridge

volumes:
  postgres_data:
